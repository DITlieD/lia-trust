name: wire

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "17 5 * * *"

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D dead_code"
  CARGO_LLVM_COV_VERSION: "0.8.7"

jobs:
  quality_and_conformance:
    name: "M6 quality + conformance"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: formatting
        run: cargo fmt --all -- --check
      - name: strict clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: workspace tests
        run: cargo test --workspace --no-fail-fast
      - name: conformance
        run: cargo run -p lia-cli -- conform --suite conformance
      - name: claims policy
        run: |
          cargo run -p lia-cli -- claims-lint --root docs
          cargo run -p lia-cli -- claims-lint --root README.md
      - name: dependency license allowlist
        run: |
          python3 tools/scripts/license_allowlist_check.py --self-test
          python3 tools/scripts/license_allowlist_check.py

  layer1_dead_code_and_deps:
    name: "L1 dead_code + machete"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: cargo check tools
        run: cargo check -p lia_wire_check -p lia_gate_freeze
      - name: cargo check workspace
        run: cargo check --workspace
      - name: cargo-machete
        uses: bnjbvr/cargo-machete@v0.7.0

  layer2_wire_check:
    name: "L2 lia_wire_check"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - name: build lia_wire_check
        run: cargo build -p lia_wire_check --release
      - name: wire-check PR changeset
        if: github.event_name == 'pull_request'
        run: |
          git diff -U0 origin/${{ github.base_ref }}...HEAD -- '*.rs' > /tmp/changeset.diff || true
          if [ ! -s /tmp/changeset.diff ]; then
            ./target/release/lia_wire_check --changeset /tmp/changeset.diff || \
              ./target/release/lia_wire_check --changeset git:origin/${{ github.base_ref }}
          else
            ./target/release/lia_wire_check --changeset /tmp/changeset.diff
          fi
      - name: wire-check push/schedule
        if: github.event_name != 'pull_request'
        run: ./target/release/lia_wire_check --changeset git:HEAD~1 || ./target/release/lia_wire_check --files $(git ls-files '*.rs' | tr '\n' ',')

  freeze_check:
    name: "R8 lia_gate_freeze --check"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: build lia_gate_freeze
        run: cargo build -p lia_gate_freeze --release
      - name: require lockfile
        run: test -f tools/gate-manifest.lock
      - name: freeze check
        run: ./target/release/lia_gate_freeze --check

  is0_seeded_rejects:
    name: "IS-0 seeded rejects"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: is0 proof
        run: bash tools/scripts/is0_local_proof.sh

  layer3_entrypoint_coverage:
    name: "L3 cargo-llvm-cov"
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - name: pin assert
        run: |
          pin="$(tr -d '[:space:]' < tools/cargo-llvm-cov.pin)"
          test "$pin" = "${CARGO_LLVM_COV_VERSION}"
      - name: install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --version "${CARGO_LLVM_COV_VERSION}" --locked
      - name: version assert
        run: |
          v=$(cargo llvm-cov --version | head -n1)
          echo "$v" | grep -q "${CARGO_LLVM_COV_VERSION}"
      - name: settling smoke
        run: bash tools/scripts/layer3_settling.sh
      - name: coverage BLOCK
        run: |
          mkdir -p coverage
          cargo llvm-cov -p lia-cli -p lia-journal -p lia-protocol \
            --json --output-path coverage/llvm-cov.json \
            --ignore-filename-regex '(tests?/|/target/)'
          test -f coverage/llvm-cov.json
          python3 tools/scripts/layer3_cov_gate.py \
            --json coverage/llvm-cov.json \
            --require-hit append_signed \
            --require-hit verify_chain \
            --require-hit parse_event \
            --require-hit main

  layer4_l0_journal_receipt:
    name: "L4 L0 journal receipt"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: journal smoke
        run: bash tools/scripts/layer4_journal_smoke.sh

  layer4_gate_receipts:
    name: "L4 gate receipts"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: gate receipt smoke
        run: bash tools/scripts/layer4_gate_receipt_smoke.sh

  is1_integration_smoke:
    name: "IS-1 multi-step gate smoke"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: is1 smoke
        run: bash tools/scripts/is1_smoke.sh

  is5_action_producer:
    name: "IS-5 sample-repo Action producer"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - id: sample
        name: create third-party-style sample repository
        shell: bash
        run: |
          set -euo pipefail
          sample="${RUNNER_TEMP}/lia-is5-sample"
          evidence="${RUNNER_TEMP}/lia-is5-evidence"
          mkdir -p "$sample" "$evidence"
          printf '%s\n' base >"$sample/readme.txt"
          git -C "$sample" init -q
          git -C "$sample" config user.email local-is5@lia.local
          git -C "$sample" config user.name local-is5
          git -C "$sample" add readme.txt
          git -C "$sample" commit -q -m base
          printf '%s\n' 'head change' >>"$sample/readme.txt"
          git -C "$sample" add readme.txt
          git -C "$sample" commit -q -m head
          printf '%s\n' supplied-evidence >"$evidence/note.txt"
          echo "repo=$sample" >>"$GITHUB_OUTPUT"
          echo "base=$(git -C "$sample" rev-parse HEAD~1)" >>"$GITHUB_OUTPUT"
          echo "head=$(git -C "$sample" rev-parse HEAD)" >>"$GITHUB_OUTPUT"
          echo "evidence=$evidence" >>"$GITHUB_OUTPUT"
      - id: action
        name: produce signed AUDIT bundle through the shipped Action
        uses: ./.github/actions/lia-trust
        with:
          repo: ${{ steps.sample.outputs.repo }}
          base: ${{ steps.sample.outputs.base }}
          head: ${{ steps.sample.outputs.head }}
          evidence: ${{ steps.sample.outputs.evidence }}
          secret_key_hex: 6666666666666666666666666666666666666666666666666666666666666666
          out: ${{ runner.temp }}/lia-is5-bundle
      - name: assert Action assurance and local conformance
        shell: bash
        run: |
          set -euo pipefail
          test "${{ steps.action.outputs.assurance_level }}" = AUDIT
          ./target/release/lia conform --suite conformance
          ./target/release/lia claims-lint --root docs
          ./target/release/lia claims-lint --root README.md
      - uses: actions/upload-artifact@v4
        with:
          name: lia-is5-audit-bundle
          path: ${{ runner.temp }}/lia-is5-bundle
          if-no-files-found: error

  is5_different_runner_verify:
    name: "IS-5 different-runner offline verify"
    needs: is5_action_producer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/download-artifact@v4
        with:
          name: lia-is5-audit-bundle
          path: ${{ runner.temp }}/lia-is5-bundle
      - name: separately build verifier and verify producer bundle
        shell: bash
        run: |
          set -euo pipefail
          CARGO_TARGET_DIR="${RUNNER_TEMP}/lia-is5-verifier" cargo build -p lia-cli --release
          "${RUNNER_TEMP}/lia-is5-verifier/release/lia" verify \
            "${RUNNER_TEMP}/lia-is5-bundle" >"${RUNNER_TEMP}/lia-is5-verify.json"
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          report = json.loads((Path(os.environ["RUNNER_TEMP"]) / "lia-is5-verify.json").read_text())
          assert report["accepted"] is True, report
          print("IS-5 different-runner verification accepted")
          PY
